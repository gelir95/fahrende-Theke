[platformio]
default_envs = sender, receiver

[env:sender]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
framework = arduino
build_src_filter = -<*> +<sender/*>
monitor_speed = 115200

[env:receiver]
; Bluepad32 erfordert ein angepasstes Arduino-Framework (Core 2.x).
; Sobald ricardoquesada/esp32-arduino-lib-builder ein Core-3.x-Paket veröffentlicht,
; kann platform auf pioarduino und platform_packages entfernt werden.
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
build_src_filter = -<*> +<receiver/*>
monitor_speed = 9600
platform_packages =
    framework-arduinoespressif32@https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip

